<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday</title>
<style>
body{
    margin:0;
    text-align:center;
    background: url('wish.png.png');
    background-size: cover;
    color:white;
    font-family:Arial;
    overflow:hidden;
    position: relative;
}

/* Dark overlay */
body::before{
    content:"";
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.3);
    z-index:0;
}

/* Countdown */
#countdown{
    font-size:80px;
    margin-top:25%;
    color:#ff99cc;
    animation:pulse 1s infinite;
    position: relative;
    z-index:1;
}
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

/* Wish */
#wish{
    display:none;
    font-size:48px;
    margin-top:18%;
    line-height:1.4;
    animation:fadeIn 2s ease-in-out;
    position: relative;
    z-index:1;
}
@keyframes fadeIn{
    from{opacity:0; transform:translateY(-30px);}
    to{opacity:1; transform:translateY(0);}
}

/* Button */
#nextBtn{
    display:none;
    margin-top:30px;
    padding:12px 30px;
    font-size:20px;
    color:white;
    background:#ff4da6;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
    position: relative;
    z-index:1;
    box-shadow: 0 0 20px #ff4da6;
    animation:glow 1.5s infinite alternate;
}
#nextBtn:hover{
    background:#ff1a8c;
    transform:scale(1.1);
}
@keyframes glow{
    0%{box-shadow: 0 0 10px #ff4da6;}
    100%{box-shadow: 0 0 30px #ff99cc;}
}

/* Falling emojis */
.falling{
    position:absolute;
    top:0; /* start from very top of page */
    font-size:24px;
    animation:fall linear infinite;
    z-index:0; /* behind content */
}
@keyframes fall{
    to{transform:translateY(100vh);}
}
</style>
</head>
<body>

<div id="countdown">3</div>

<h1 id="wish">
🎉Many more happy returns of the day <br>
thalaivarey✨💗
</h1>

<button id="nextBtn">Next 💌</button>

<script>
/* Falling emojis from page top, full width */
function createFalling(){
    const symbols = ["💗","🦋","✨","💖"];
    let item = document.createElement("div");
    item.className = "falling";
    item.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];
    
    // spread horizontally
    item.style.left = Math.random()*100 + "vw"; 
    item.style.animationDuration = (3 + Math.random()*3) + "s";
    
    document.body.appendChild(item);
    setTimeout(() => { item.remove() }, 5000); // remove after fall
}
setInterval(createFalling,200);

/* Countdown */
let timeLeft = 3;
const countdownEl = document.getElementById("countdown");
const wishEl = document.getElementById("wish");
const nextBtn = document.getElementById("nextBtn");

let timer = setInterval(function(){
    timeLeft--;
    if(timeLeft > 0){
        countdownEl.innerHTML = timeLeft;
    } else {
        clearInterval(timer);
        countdownEl.style.display = "none";
        wishEl.style.display = "block";
        nextBtn.style.display = "inline-block";
    }
},1000);

/* Button click -> 3 sec delay -> next page */
nextBtn.addEventListener("click", function(){
    nextBtn.disabled = true;
    nextBtn.innerHTML = "Loading...";
    setTimeout(function(){
        window.location.href = "thalaivar.html";
    }, 3000);
});
</script>

</body>
</html>
